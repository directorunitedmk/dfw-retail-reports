function fmt(n) {
  if (!n || n === 0) return 'Unpriced';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2).replace(/\.?0+$/,'') + 'M';
  return '$' + n.toLocaleString();
}
function fmtCap(c) { return c && c > 0 ? c.toFixed(2) + '%' : 'N/A'; }
function fmtSF(sf) { return sf && sf > 0 ? sf.toLocaleString() + ' SF' : 'N/A'; }
function domClass(d) {
  if (d <= 3) return 'dom-green';
  if (d <= 30) return 'dom-gold';
  if (d <= 90) return 'dom-red';
  return 'dom-gray';
}
function domLabel(d) {
  if (d <= 3) return d + 'd NEW';
  if (d <= 30) return d + 'd';
  if (d <= 90) return d + 'd';
  return 'N/A';
}

function renderCards() {
  const sort = document.getElementById('sortBy').value;
  const minCap = parseFloat(document.getElementById('filterCap').value) || 0;
  const maxPrice = parseFloat(document.getElementById('filterPrice').value) || 999999999;
  const topOnly = document.getElementById('topPickOnly').checked;
  const critOnly = document.getElementById('criteriaOnly').checked;

  let data = listings.filter(l => {
    if (topOnly && !l.topPick) return false;
    if (critOnly && !l.criteria) return false;
    if (minCap > 0 && l.cap < minCap) return false;
    if (maxPrice < 999999999 && l.price > 0 && l.price > maxPrice) return false;
    return true;
  });

  if (sort === 'new') data.sort((a,b) => a.dom - b.dom);
  else if (sort === 'cap') data.sort((a,b) => (b.cap||0) - (a.cap||0));
  else if (sort === 'price_asc') data.sort((a,b) => (a.price||999e9) - (b.price||999e9));
  else if (sort === 'price_desc') data.sort((a,b) => (b.price||0) - (a.price||0));
  else if (sort === 'sf') data.sort((a,b) => (b.sf||0) - (a.sf||0));

  // Stats
  const priced = data.filter(l => l.price > 0);
  const capped = data.filter(l => l.cap > 0);
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('newCount').textContent = data.filter(l => l.topPick).length;
  document.getElementById('criteriaCount').textContent = data.filter(l => l.criteria).length;
  if (priced.length) {
    const mn = Math.min(...priced.map(l=>l.price)), mx = Math.max(...priced.map(l=>l.price));
    document.getElementById('priceRange').textContent = fmt(mn) + ' – ' + fmt(mx);
  }
  if (capped.length) {
    const mn = Math.min(...capped.map(l=>l.cap)), mx = Math.max(...capped.map(l=>l.cap));
    document.getElementById('capRange').textContent = mn.toFixed(2) + '% – ' + mx.toFixed(2) + '%';
  }

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  data.forEach(l => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-photo">
        <div class="photo-placeholder">📍 ${l.source}</div>
        <div class="badges">
          ${l.topPick ? '<span class="badge badge-new">⭐ Top Pick</span>' : ''}
          ${l.criteria ? '<span class="badge badge-criteria">✓ Criteria Match</span>' : ''}
          <span class="badge badge-source">${l.source}</span>
        </div>
        <div class="dom-pill ${domClass(l.dom)}">${domLabel(l.dom)}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${l.title}</div>
        <div class="card-address">📍 ${l.address}</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="lbl">Price</div><div class="val">${fmt(l.price)}</div></div>
          <div class="stat-box"><div class="lbl">Cap Rate</div><div class="val val-gold">${fmtCap(l.cap)}</div></div>
          <div class="stat-box"><div class="lbl">Size</div><div class="val">${fmtSF(l.sf)}</div></div>
          <div class="stat-box"><div class="lbl">Occupancy</div><div class="val">${l.occ || 'N/A'}</div></div>
        </div>
        ${l.tenants ? `<div class="card-notes"><strong>Tenants:</strong> ${l.tenants}</div>` : ''}
        ${l.notes ? `<div class="card-notes">${l.notes}</div>` : ''}
      </div>
      <div class="card-footer">
        <a class="btn-view" href="${l.url}" target="_blank" rel="noopener">View Listing →</a>
      </div>`;
    grid.appendChild(card);
  });
}
